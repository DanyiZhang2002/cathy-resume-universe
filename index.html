<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张丹逸 · 简历宇宙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04010f;
  --ring:#c084fc;
  --ring2:#818cf8;
  --ring3:#f472b6;
  --gold:#fbbf24;
  --green:#34d399;
  --blue:#60a5fa;
  --text:#e2e8f0;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Georgia',serif;color:var(--text);}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;}

/* ── SOLAR SYSTEM ── */
#solar{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
#system-wrap{position:relative;width:700px;height:700px;}

/* sun */
.sun{
  position:absolute;top:50%;left:50%;
  width:64px;height:64px;margin:-32px 0 0 -32px;
  border-radius:50%;
  background:radial-gradient(circle,#fff9c4,#fde68a 40%,#f59e0b 70%,transparent);
  box-shadow:0 0 40px 20px rgba(251,191,36,.45),0 0 80px 40px rgba(251,191,36,.2);
  z-index:10;cursor:pointer;
  animation:sun-pulse 3s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 40px 20px rgba(251,191,36,.45),0 0 80px 40px rgba(251,191,36,.2);}50%{box-shadow:0 0 55px 28px rgba(251,191,36,.6),0 0 110px 55px rgba(251,191,36,.3);}}

/* orbit rings */
.orbit{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.07);
  transform:translate(-50%,-50%) rotateX(60deg);
  transform-style:preserve-3d;
  pointer-events:none;
}

/* planet */
.planet{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  transition:transform .2s,filter .2s;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  text-align:center;line-height:1.2;
  flex-direction:column;gap:2px;
  user-select:none;
  z-index:20;
}
.planet:hover{transform:scale(1.18);filter:brightness(1.3);}
.planet.active{filter:brightness(1.4);transform:scale(1.22);}
.planet-label{
  position:absolute;white-space:nowrap;
  font-size:.65rem;letter-spacing:.08em;
  color:rgba(226,232,240,.65);
  top:calc(100% + 5px);left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.planet-ring{
  position:absolute;
  border-radius:50%;border:2px solid rgba(255,255,255,.18);
  pointer-events:none;
  top:50%;left:50%;transform:translate(-50%,-50%) rotateX(70deg);
}

/* ── ASTEROID BELT ── */
#asteroid-belt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:5;}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:50;
  background:rgba(4,1,15,.7);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:40px;padding:6px 8px;
}
.nav-tab{
  padding:8px 20px;border-radius:30px;font-size:.75rem;
  letter-spacing:.1em;cursor:pointer;border:none;
  color:rgba(226,232,240,.45);background:none;
  transition:all .3s;font-family:inherit;
}
.nav-tab.active{background:rgba(192,132,252,.15);color:var(--ring);border:1px solid rgba(192,132,252,.3);}
.nav-tab:hover:not(.active){color:rgba(226,232,240,.8);}

/* ── LEFT PLANET LIST ── */
#planet-list{
  position:fixed;left:24px;top:50%;transform:translateY(-50%);
  z-index:50;display:flex;flex-direction:column;gap:8px;
}
.pl-item{
  display:flex;align-items:center;gap:9px;
  padding:6px 12px 6px 8px;
  border-radius:20px;cursor:pointer;
  border:1px solid transparent;
  transition:all .25s;font-size:.72rem;letter-spacing:.06em;
  color:rgba(226,232,240,.45);
}
.pl-item:hover,.pl-item.active{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.12);
  color:rgba(226,232,240,.9);
}
.pl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── TOP TITLE ── */
#top-title{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  z-index:50;text-align:center;pointer-events:none;
}
.tt-name{
  font-size:1.5rem;font-weight:700;letter-spacing:.08em;
  background:linear-gradient(135deg,#f1f5f9,#c084fc,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tt-sub{font-size:.7rem;color:rgba(226,232,240,.35);letter-spacing:.2em;margin-top:3px;}

/* ── PANEL ── */
#panel{
  position:fixed;right:0;top:0;bottom:0;
  width:400px;z-index:60;
  background:rgba(4,1,15,.92);
  backdrop-filter:blur(24px);
  border-left:1px solid rgba(255,255,255,.08);
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.25,.8,.25,1);
  overflow-y:auto;
  padding:32px 28px 48px;
}
#panel.open{transform:translateX(0);}
#panel-close{
  position:absolute;top:18px;right:20px;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  color:rgba(226,232,240,.6);transition:all .2s;
}
#panel-close:hover{background:rgba(255,255,255,.12);color:#fff;}
.panel-planet-icon{font-size:48px;margin-bottom:16px;}
.panel-pretitle{font-size:.68rem;color:var(--panel-color,#c084fc);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;}
.panel-title{font-size:1.4rem;font-weight:700;margin-bottom:6px;color:#f1f5f9;}
.panel-org{font-size:.85rem;color:var(--panel-color,#c084fc);margin-bottom:14px;}
.panel-desc{font-size:.83rem;line-height:1.8;color:rgba(226,232,240,.65);margin-bottom:16px;}
.panel-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.ptag{padding:3px 10px;border-radius:10px;font-size:.7rem;background:rgba(192,132,252,.1);color:var(--panel-color,#c084fc);border:1px solid rgba(192,132,252,.2);}
.panel-ul{padding-left:16px;font-size:.82rem;line-height:1.85;color:rgba(226,232,240,.6);}
.panel-ul li{margin-bottom:5px;}
.panel-divider{height:1px;background:rgba(255,255,255,.07);margin:18px 0;}
.panel-sub-title{font-size:.75rem;color:rgba(226,232,240,.35);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}

/* skill bar in panel */
.sk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sk-lbl{font-size:.78rem;width:90px;flex-shrink:0;color:rgba(226,232,240,.7);}
.sk-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;}
.sk-fill{height:100%;border-radius:2px;background:var(--panel-color,#c084fc);}

/* ── INTRO HINT ── */
#hint{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:rgba(226,232,240,.28);letter-spacing:.12em;
  pointer-events:none;z-index:40;text-align:center;
  animation:hint-fade 2s ease 2s both;
}
@keyframes hint-fade{from{opacity:0;}to{opacity:1;}}

/* scrollbar */
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:rgba(192,132,252,.3);border-radius:2px;}

@media(max-width:768px){
  #system-wrap{width:380px;height:380px;}
  #panel{width:100%;right:0;top:auto;bottom:0;height:75vh;border-left:none;border-top:1px solid rgba(255,255,255,.08);}
  #planet-list{display:none;}
  .tt-name{font-size:1.1rem;}
}
</style>
</head>
<body>

    content:{

        {name:'NLP 文本分析',pct:78},{name:'金融量化建模',pct:75},{name:'英语（雅思8.0）',pct:95},
      ]
    }

];

// ── BACKGROUND STARS ──
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let stars = [];
function resizeBg(){
  bgCanvas.width=innerWidth; bgCanvas.height=innerHeight;
  stars=[];
  for(let i=0;i<280;i++){
    stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      r:Math.random()*1.4+.3,a:Math.random(),da:(Math.random()*.015+.005)*(Math.random()<.5?1:-1)});
  }
}
resizeBg();
window.addEventListener('resize',resizeBg);

function drawBg(){
  bgCtx.fillStyle='#04010f';
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  // galactic haze
  const g=bgCtx.createRadialGradient(innerWidth*.5,innerHeight*.5,0,innerWidth*.5,innerHeight*.5,innerWidth*.7);
  g.addColorStop(0,'rgba(88,28,135,.18)');g.addColorStop(.5,'rgba(30,27,75,.12)');g.addColorStop(1,'transparent');
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  // stars
  stars.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<.05){s.da*=-1;}
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${s.a})`;bgCtx.fill();
  });
  // meteors occasionally
  requestAnimationFrame(drawBg);
}
drawBg();

// ── ASTEROID BELT ──
const abCanvas = document.getElementById('asteroid-belt');
const abCtx = abCanvas.getContext('2d');
const CX=350,CY=350;
const asteroids=[];
for(let i=0;i<180;i++){
  const a=Math.random()*Math.PI*2;
  const r=175+Math.random()*28;
  asteroids.push({angle:a,r,size:Math.random()*1.2+.3,speed:Math.random()*.0004+.0001,op:Math.random()*.4+.1});
}
function drawAsteroids(){
  abCtx.clearRect(0,0,700,700);
  asteroids.forEach(a=>{
    a.angle+=a.speed;
    const x=CX+Math.cos(a.angle)*a.r;
    const y=CY+Math.sin(a.angle)*a.r*.38; // perspective squash
    abCtx.beginPath();abCtx.arc(x,y,a.size,0,Math.PI*2);
    abCtx.fillStyle=`rgba(200,180,255,${a.op})`;abCtx.fill();
  });
  requestAnimationFrame(drawAsteroids);
}
drawAsteroids();

// ── BUILD ORBITS & PLANETS ──
const wrap = document.getElementById('system-wrap');
const planetList = document.getElementById('planet-list');
const angleState = {};

PLANETS.forEach(p=>{
  angleState[p.id]=p.startAngle*(Math.PI/180);

  // orbit ring
  const orb=document.createElement('div');
  orb.className='orbit';
  const d=p.radius*2;
  orb.style.cssText=`width:${d}px;height:${d}px;`;
  wrap.appendChild(orb);

  // planet element
  const el=document.createElement('div');
  el.className='planet';
  el.id='planet-'+p.id;
  el.style.cssText=`width:${p.size}px;height:${p.size}px;background:${p.bg};box-shadow:0 0 18px 6px ${p.shadow};font-size:${p.size*.38}px;`;
  el.innerHTML=`<span>${p.emoji}</span>`;
  el.title=p.label;
  wrap.appendChild(el);

  // saturn-like ring for some
  if(p.id==='deloitte'||p.id==='skill'){
    const rng=document.createElement('div');
    rng.className='planet-ring';
    rng.style.cssText=`width:${p.size*1.7}px;height:${p.size*1.7}px;`;
    el.appendChild(rng);
  }

  // left list item
  const li=document.createElement('div');
  li.className='pl-item';li.dataset.id=p.id;
  li.innerHTML=`<div class="pl-dot" style="background:${p.color};box-shadow:0 0 5px ${p.color};"></div><span>${p.label}</span>`;
  planetList.appendChild(li);
  li.addEventListener('click',()=>openPanel(p.id));

  el.addEventListener('click',()=>openPanel(p.id));
});

// ── ANIMATE PLANETS ──
let lastT=0;
function animatePlanets(t){
  const dt=(t-lastT)/1000; lastT=t;
  PLANETS.forEach(p=>{
    angleState[p.id]+=p.speed*dt;
    const a=angleState[p.id];
    const x=CX+Math.cos(a)*p.radius;
    const y=CY+Math.sin(a)*p.radius*.42; // perspective squash
    const el=document.getElementById('planet-'+p.id);
    if(el){
      el.style.left=(x-p.size/2)+'px';
      el.style.top=(y-p.size/2)+'px';
      // depth z-index
      el.style.zIndex=Math.round(20+y);
      // size based on y (depth)
      const depth=0.78+((y-CY+p.radius*.42)/(p.radius*.84))*0.22;
      el.style.transform=`scale(${depth.toFixed(3)})`;
    }
  });
  requestAnimationFrame(animatePlanets);
}
requestAnimationFrame(animatePlanets);

// ── PANEL ──
const panel=document.getElementById('panel');
const panelBody=document.getElementById('panel-body');
const panelClose=document.getElementById('panel-close');

function openPanel(id){
  const p=PLANETS.find(x=>x.id===id);
  if(!p)return;
  // highlight planet
  document.querySelectorAll('.planet').forEach(el=>el.classList.remove('active'));
  document.getElementById('planet-'+id)?.classList.add('active');
  document.querySelectorAll('.pl-item').forEach(li=>{li.classList.toggle('active',li.dataset.id===id);});

  panel.style.setProperty('--panel-color',p.color);
  let html=`<div class="panel-planet-icon">${p.content.icon}</div>
    <div class="panel-pretitle">${p.content.pretitle||''}</div>
    <div class="panel-title">${p.content.title}</div>`;

  if(p.content.org) html+=`<div class="panel-org">${p.content.org}</div>`;
  if(p.content.desc) html+=`<div class="panel-desc">${p.content.desc}</div>`;

  // multi-item (education)
  if(p.content.items){
    p.content.items.forEach((item,i)=>{
      if(i>0) html+=`<div class="panel-divider"></div>`;
      html+=`<div class="panel-sub-title">${item.period}</div>
        <div class="panel-title" style="font-size:1.05rem;margin-bottom:4px;">${item.title}</div>
        <div class="panel-org">${item.org}</div>
        <div class="panel-desc">${item.desc}</div>`;
      if(item.tags) html+=`<div class="panel-tags">${item.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>`;
    });
  }

  // bullets
  if(p.content.bullets){
    html+=`<ul class="panel-ul">${p.content.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  }
  if(p.content.tags){
    html+=`<div class="panel-tags" style="margin-top:14px;">${p.content.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>`;
  }

  // skills
  if(p.content.skills){
    html+=`<div class="panel-sub-title" style="margin-top:4px;">熟练度</div>`;
    p.content.skills.forEach(s=>{
      html+=`<div class="sk-row"><span class="sk-lbl">${s.name}</span><div class="sk-bar"><div class="sk-fill" style="width:${s.pct}%;"></div></div></div>`;
    });
  }

  panelBody.innerHTML=html;
  panel.classList.add('open');
}

panelClose.addEventListener('click',()=>{
  panel.classList.remove('open');
  document.querySelectorAll('.planet').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.pl-item').forEach(li=>li.classList.remove('active'));
});
