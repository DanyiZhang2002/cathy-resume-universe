<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张丹逸 | 宇宙简历</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0014;
  overflow: hidden;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e2e8f0;
  cursor: default;
}
canvas { display: block; }

/* Top header */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  text-align: center;
  padding: 28px 20px 16px;
  z-index: 10;
  pointer-events: none;
}
#header h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 6px;
  color: #f0e6ff;
  text-shadow: 0 0 30px rgba(147,51,234,0.5);
}
#header p {
  font-size: 13px;
  color: rgba(226,232,240,0.5);
  margin-top: 6px;
  letter-spacing: 3px;
}

/* Left navigation */
#left-nav {
  position: fixed;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.nav-dot {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.3s, transform 0.3s;
}
.nav-dot:hover { opacity: 1; transform: translateX(4px); }
.nav-dot.active { opacity: 1; }
.nav-dot .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.5);
  transition: all 0.3s;
}
.nav-dot.active .dot {
  border-color: currentColor;
  box-shadow: 0 0 8px currentColor;
}
.nav-dot .label {
  font-size: 11px;
  letter-spacing: 1px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
}
.nav-dot:hover .label { opacity: 1; }

/* Right panel */
#panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 380px;
  background: rgba(10,0,20,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid rgba(192,132,252,0.25);
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index: 20;
  overflow-y: auto;
  padding: 60px 32px 32px;
}
#panel.open { transform: translateX(0); }
#panel-close {
  position: absolute;
  top: 20px; right: 20px;
  width: 32px; height: 32px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  color: #e2e8f0;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
#panel-close:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
}
#panel-icon {
  font-size: 36px;
  margin-bottom: 12px;
}
#panel-title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
#panel-subtitle {
  font-size: 12px;
  color: rgba(226,232,240,0.5);
  letter-spacing: 2px;
  margin-bottom: 24px;
  text-transform: uppercase;
}
#panel-body {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(226,232,240,0.85);
}
#panel-body .item {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
#panel-body .item:last-child { border-bottom: none; }
#panel-body .item-title {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}
#panel-body .item-meta {
  font-size: 12px;
  color: rgba(226,232,240,0.45);
  margin-bottom: 6px;
}
#panel-body .item-desc {
  font-size: 13px;
  color: rgba(226,232,240,0.7);
  line-height: 1.7;
}
#panel-body .skill-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
#panel-body .skill-name {
  font-size: 13px;
  width: 72px;
  text-align: right;
  color: rgba(226,232,240,0.7);
}
#panel-body .skill-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
#panel-body .skill-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
#panel-body .skill-pct {
  font-size: 11px;
  width: 32px;
  color: rgba(226,232,240,0.5);
}
#panel-body .contact-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  font-size: 13px;
}
#panel-body .contact-label {
  color: rgba(226,232,240,0.45);
  width: 50px;
  text-align: right;
  font-size: 11px;
  letter-spacing: 1px;
}

/* Bottom nav */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 16px 20px;
  z-index: 10;
  background: linear-gradient(transparent, rgba(10,0,20,0.8));
}
#bottom-nav a {
  font-size: 11px;
  color: rgba(226,232,240,0.4);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
  cursor: pointer;
}
#bottom-nav a:hover { color: rgba(226,232,240,0.8); }

/* Tooltip */
#tooltip {
  position: fixed;
  padding: 6px 14px;
  background: rgba(10,0,20,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(192,132,252,0.2);
  border-radius: 6px;
  font-size: 12px;
  color: #e2e8f0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 15;
  white-space: nowrap;
}
#tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <h1>张 丹 逸</h1>
  <p>Data Science · Environmental Modeling · NLP</p>
</div>

<div id="left-nav"></div>

<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-icon"></div>
  <div id="panel-title"></div>
  <div id="panel-subtitle"></div>
  <div id="panel-body"></div>
</div>

<div id="tooltip"></div>

<div id="bottom-nav">
  <a data-idx="0">教育</a>
  <a data-idx="1">小红书</a>
  <a data-idx="2">Ipsos</a>
  <a data-idx="3">Cryptoracle</a>
  <a data-idx="4">科大讯飞</a>
  <a data-idx="5">德勤</a>
  <a data-idx="6">TCM-GPT</a>
  <a data-idx="7">技能</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== DATA ====================
const planets = [
  {
    name: '教育', icon: '🎓', color: '#9333ea', orbit: 60, size: 6, speed: 0.008,
    subtitle: 'Education',
    content: `<div class="item">
      <div class="item-title">UCL · 环境数据建模 理学硕士</div>
      <div class="item-meta">2024.09 - 2026.02</div>
      <div class="item-desc">University College London，环境数据建模方向</div>
    </div>
    <div class="item">
      <div class="item-title">西交利物浦大学 · 金融数学</div>
      <div class="item-meta">2020 - 2024</div>
      <div class="item-desc">本科金融数学专业</div>
    </div>`
  },
  {
    name: '小红书', icon: '📱', color: '#f43f5e', orbit: 90, size: 5.5, speed: 0.006,
    subtitle: 'Xiaohongshu · Strategy Operations',
    content: `<div class="item">
      <div class="item-title">小红书 · 策略运营 — 社区回查数据岗</div>
      <div class="item-meta">2025.10 - 2025.12 · 上海</div>
      <div class="item-desc">• SQL 数据看板搭建与分析<br>• A/B 测试设计与效果评估<br>• 特征因子挖掘与策略优化</div>
    </div>`
  },
  {
    name: 'Ipsos', icon: '📊', color: '#3b82f6', orbit: 120, size: 5, speed: 0.005,
    subtitle: 'Ipsos · Quantitative Research',
    content: `<div class="item">
      <div class="item-title">Ipsos 益普索 · 定量研究实习</div>
      <div class="item-meta">2025.09 - 2025.10 · 上海</div>
      <div class="item-desc">• SPSS 数据分析<br>• 品牌广告效果分析<br>• 亿滋（Mondelez）商业分析项目</div>
    </div>`
  },
  {
    name: 'Cryptoracle', icon: '₿', color: '#f59e0b', orbit: 145, size: 5, speed: 0.004,
    subtitle: 'Cryptoracle · Data Analytics',
    content: `<div class="item">
      <div class="item-title">Cryptoracle · 数据分析实习</div>
      <div class="item-meta">2025.06 - 2025.07 · 马来西亚</div>
      <div class="item-desc">• SQL 数据查询与管理<br>• PCA 主成分分析<br>• 时间序列预测模型<br>• 聚类用户画像构建</div>
    </div>`
  },
  {
    name: '科大讯飞', icon: '🤖', color: '#10b981', orbit: 168, size: 5.5, speed: 0.0035,
    subtitle: 'iFlytek · Knowledge Graph',
    content: `<div class="item">
      <div class="item-title">科大讯飞 · 知识图谱部研究实习</div>
      <div class="item-meta">2023.07 - 2023.10 · 苏州</div>
      <div class="item-desc">• NLP 文本分类模型研发<br>• 分类准确率达到 98%<br>• 知识图谱构建与维护</div>
    </div>`
  },
  {
    name: '德勤', icon: '🏢', color: '#a78bfa', orbit: 195, size: 5, speed: 0.003,
    subtitle: 'Deloitte · Risk Advisory',
    content: `<div class="item">
      <div class="item-title">德勤 · 风险咨询实习</div>
      <div class="item-meta">2022.05 - 2022.08 · 重庆</div>
      <div class="item-desc">• 异常检测算法开发<br>• 风险预警系统优化<br>• 预警准确率达 93%</div>
    </div>`
  },
  {
    name: 'TCM-GPT', icon: '🌿', color: '#f472b6', orbit: 220, size: 5, speed: 0.0025,
    subtitle: 'TCM-GPT · NLP Research',
    content: `<div class="item">
      <div class="item-title">上海中医药大学 × 百度 · TCM-GPT</div>
      <div class="item-meta">2023.09 - 2024.06</div>
      <div class="item-desc">• 百万字中医语料数据处理<br>• NLP 实体识别模型训练<br>• 中医药知识图谱构建</div>
    </div>`
  },
  {
    name: '技能', icon: '⚡', color: '#fbbf24', orbit: 260, size: 7, speed: 0.002,
    isSaturn: true,
    subtitle: 'Technical Skills',
    skills: [
      { name: 'Python', pct: 92 },
      { name: 'SQL', pct: 90 },
      { name: 'SPSS', pct: 88 },
      { name: 'R', pct: 82 },
      { name: 'ML', pct: 80 },
      { name: 'NLP', pct: 78 },
      { name: 'GIS', pct: 78 },
      { name: '英语', pct: 95 }
    ],
    content: 'skills'
  }
];

const centerData = {
  name: '张丹逸',
  icon: '☀️',
  subtitle: 'Contact & Links',
  content: 'center'
};

// ==================== SCENE SETUP ====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
camera.position.set(0, 280, 200);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0014);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ==================== LIGHTING ====================
const ambientLight = new THREE.AmbientLight(0x1a0a2e, 0.6);
scene.add(ambientLight);

const centerLight = new THREE.PointLight(0xfce4a8, 2.5, 600, 1.5);
centerLight.position.set(0, 20, 0);
scene.add(centerLight);

const fillLight = new THREE.PointLight(0x9333ea, 0.4, 500);
fillLight.position.set(-100, 80, -100);
scene.add(fillLight);

// ==================== CENTER STAR ====================
const starGeom = new THREE.SphereGeometry(16, 48, 48);
const starMat = new THREE.MeshBasicMaterial({ color: 0xffeebb });
const star = new THREE.Mesh(starGeom, starMat);
star.position.set(0, 0, 0);
star.userData = { isCenter: true, dataIdx: -1 };
scene.add(star);

// Star glow
const glowGeom = new THREE.SphereGeometry(22, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xffdd88, transparent: true, opacity: 0.15
});
const glow = new THREE.Mesh(glowGeom, glowMat);
scene.add(glow);

// Star outer glow
const glow2Geom = new THREE.SphereGeometry(30, 32, 32);
const glow2Mat = new THREE.MeshBasicMaterial({
  color: 0xcc88ff, transparent: true, opacity: 0.06
});
const glow2 = new THREE.Mesh(glow2Geom, glow2Mat);
scene.add(glow2);

// ==================== BACKGROUND STARS ====================
const bgStarsCount = 2000;
const bgStarsGeom = new THREE.BufferGeometry();
const bgStarsPos = new Float32Array(bgStarsCount * 3);
const bgStarsSizes = new Float32Array(bgStarsCount);
for (let i = 0; i < bgStarsCount; i++) {
  const r = 500 + Math.random() * 800;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  bgStarsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  bgStarsPos[i*3+1] = (Math.random() - 0.3) * 600;
  bgStarsPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
  bgStarsSizes[i] = 0.5 + Math.random() * 1.5;
}
bgStarsGeom.setAttribute('position', new THREE.BufferAttribute(bgStarsPos, 3));
bgStarsGeom.setAttribute('size', new THREE.BufferAttribute(bgStarsSizes, 1));
const bgStarsMat = new THREE.PointsMaterial({
  color: 0xddd8ff, size: 1.2, transparent: true, opacity: 0.7,
  sizeAttenuation: true
});
const bgStars = new THREE.Points(bgStarsGeom, bgStarsMat);
scene.add(bgStars);

// ==================== ORBIT PARTICLES ====================
function createOrbitParticles(radius, color, count) {
  count = count || Math.floor(500 + (radius / 260) * 300);
  const geom = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const spread = (Math.random() - 0.5) * 4;
    const r = radius + spread;
    pos[i*3] = Math.cos(angle) * r;
    pos[i*3+1] = (Math.random() - 0.5) * 1.5;
    pos[i*3+2] = Math.sin(angle) * r;
  }
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const c = new THREE.Color(color);
  const mat = new THREE.PointsMaterial({
    color: c, size: 0.8, transparent: true, opacity: 0.3,
    sizeAttenuation: true
  });
  return new THREE.Points(geom, mat);
}

planets.forEach(p => {
  const orbitLine = createOrbitParticles(p.orbit, p.color);
  scene.add(orbitLine);
});

// ==================== PLANETS ====================
const planetMeshes = [];
const planetAngles = [];

planets.forEach((p, idx) => {
  const geom = new THREE.SphereGeometry(p.size, 32, 32);
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(p.color),
    emissive: new THREE.Color(p.color).multiplyScalar(0.15),
    shininess: 80,
    specular: new THREE.Color(0xffffff).multiplyScalar(0.4),
  });
  const mesh = new THREE.Mesh(geom, mat);
  const startAngle = Math.random() * Math.PI * 2;
  mesh.position.set(
    Math.cos(startAngle) * p.orbit,
    0,
    Math.sin(startAngle) * p.orbit
  );
  mesh.userData = { dataIdx: idx };
  scene.add(mesh);
  planetMeshes.push(mesh);
  planetAngles.push(startAngle);

  // Planet glow
  const pgGeom = new THREE.SphereGeometry(p.size * 1.4, 16, 16);
  const pgMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(p.color), transparent: true, opacity: 0.08
  });
  const pgMesh = new THREE.Mesh(pgGeom, pgMat);
  mesh.add(pgMesh);

  // Saturn ring
  if (p.isSaturn) {
    const ringGeom = new THREE.TorusGeometry(p.size * 1.8, 1.2, 2, 64);
    const ringMat = new THREE.MeshPhongMaterial({
      color: new THREE.Color(p.color),
      emissive: new THREE.Color(p.color).multiplyScalar(0.2),
      transparent: true, opacity: 0.6,
      shininess: 40,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = Math.PI / 2.2;
    mesh.add(ring);

    // Second ring
    const ring2Geom = new THREE.TorusGeometry(p.size * 2.2, 0.6, 2, 64);
    const ring2Mat = new THREE.MeshPhongMaterial({
      color: new THREE.Color(p.color),
      transparent: true, opacity: 0.3,
      side: THREE.DoubleSide
    });
    const ring2 = new THREE.Mesh(ring2Geom, ring2Mat);
    ring2.rotation.x = Math.PI / 2.2;
    mesh.add(ring2);
  }
});

// ==================== RAYCASTER ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPlanet = null;

const allClickable = [star, ...planetMeshes];

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allClickable);
  
  const tooltip = document.getElementById('tooltip');
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const dIdx = obj.userData.dataIdx;
    renderer.domElement.style.cursor = 'pointer';
    
    if (obj.userData.isCenter) {
      tooltip.textContent = '☀️ 张丹逸 · 点击查看联系方式';
    } else {
      const p = planets[dIdx];
      tooltip.textContent = p.icon + ' ' + p.name;
    }
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.classList.add('visible');
    hoveredPlanet = obj;
  } else {
    renderer.domElement.style.cursor = 'default';
    tooltip.classList.remove('visible');
    hoveredPlanet = null;
  }
});

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allClickable);
  
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const dIdx = obj.userData.dataIdx;
    if (obj.userData.isCenter) {
      openPanel(-1);
    } else {
      openPanel(dIdx);
    }
  }
});

// ==================== PANEL ====================
const panel = document.getElementById('panel');
const panelIcon = document.getElementById('panel-icon');
const panelTitle = document.getElementById('panel-title');
const panelSubtitle = document.getElementById('panel-subtitle');
const panelBody = document.getElementById('panel-body');
let currentPanelIdx = null;

function openPanel(idx) {
  currentPanelIdx = idx;
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  if (idx === -1) {
    panelIcon.textContent = '☀️';
    panelTitle.textContent = '张丹逸';
    panelTitle.style.color = '#ffdd88';
    panelSubtitle.textContent = 'Contact & Links';
    panelBody.innerHTML = `
      <div class="contact-row"><span class="contact-label">邮箱</span><span>13359485898@163.com</span></div>
      <div class="contact-row"><span class="contact-label">手机</span><span>133-5948-5898</span></div>
      <div class="contact-row"><span class="contact-label">微信</span><span>zdy020115</span></div>
      <div class="contact-row"><span class="contact-label">GitHub</span><span>DanyiZhang2002</span></div>
    `;
  } else {
    const p = planets[idx];
    panelIcon.textContent = p.icon;
    panelTitle.textContent = p.name;
    panelTitle.style.color = p.color;
    panelSubtitle.textContent = p.subtitle;

    if (p.content === 'skills') {
      panelBody.innerHTML = p.skills.map(s => `
        <div class="skill-bar">
          <span class="skill-name">${s.name}</span>
          <div class="skill-track">
            <div class="skill-fill" style="width:0%;background:${p.color};" data-target="${s.pct}"></div>
          </div>
          <span class="skill-pct">${s.pct}%</span>
        </div>
      `).join('');
      // Animate skill bars
      setTimeout(() => {
        panelBody.querySelectorAll('.skill-fill').forEach(el => {
          el.style.width = el.dataset.target + '%';
        });
      }, 100);
    } else {
      panelBody.innerHTML = p.content;
    }
  }

  panel.classList.add('open');
  document.getElementById('tooltip').classList.remove('visible');
}

function closePanel() {
  panel.classList.remove('open');
  currentPanelIdx = null;
  document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
}

document.getElementById('panel-close').addEventListener('click', closePanel);

// ==================== LEFT NAV ====================
const leftNav = document.getElementById('left-nav');
planets.forEach((p, idx) => {
  const dot = document.createElement('div');
  dot.className = 'nav-dot';
  dot.style.color = p.color;
  dot.innerHTML = `<span class="dot" style="background:${p.color}30;border-color:${p.color}88"></span><span class="label">${p.icon} ${p.name}</span>`;
  dot.addEventListener('click', () => openPanel(idx));
  leftNav.appendChild(dot);
});

// Bottom nav
document.querySelectorAll('#bottom-nav a').forEach(a => {
  a.addEventListener('click', () => openPanel(parseInt(a.dataset.idx)));
});

// ==================== ANIMATION ====================
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 1;

  // Rotate planets
  planetMeshes.forEach((mesh, idx) => {
    planetAngles[idx] += planets[idx].speed;
    const r = planets[idx].orbit;
    mesh.position.x = Math.cos(planetAngles[idx]) * r;
    mesh.position.z = Math.sin(planetAngles[idx]) * r;
    mesh.rotation.y += 0.01;
  });

  // Star pulse
  const pulse = 1 + Math.sin(time * 0.02) * 0.05;
  star.scale.set(pulse, pulse, pulse);
  glow.scale.set(pulse * 1.1, pulse * 1.1, pulse * 1.1);
  glow2.scale.set(pulse * 0.95, pulse * 0.95, pulse * 0.95);

  // Star glow rotation
  glow.rotation.y += 0.002;
  glow2.rotation.y -= 0.001;

  // Background stars twinkle
  bgStars.rotation.y += 0.0001;

  renderer.render(scene, camera);
}
animate();

// ==================== RESIZE ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
