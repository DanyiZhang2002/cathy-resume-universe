const CONTACT = {
  icon:'🌟', period:'Contact', title:'张丹逸 · Danyi Zhang', org:'UCL 环境数据建模 硕士',
  bullets:['📧 13359485898@163.com','📱 (+86) 133-5948-5898','💬 微信：zdy020115','🐙 github.com/DanyiZhang2002'],
  tags:['Data Science','Environmental Modeling','NLP','金融量化']

// ═══════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x050010, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(58, W/H, 0.1, 8000);
camera.position.set(0, 0, 820);
camera.lookAt(0, 0, 0);

// Lights
const ambLight = new THREE.AmbientLight(0x221133, 1.2);
scene.add(ambLight);
const sunLight = new THREE.PointLight(0xffffff, 3.5, 1200);
scene.add(sunLight);
const fillLight = new THREE.PointLight(0x4433aa, 0.8, 800);
fillLight.position.set(-300, 200, 100);
scene.add(fillLight);

// ── Galaxy Group (tilted) ──
const galaxyGroup = new THREE.Group();
galaxyGroup.rotation.x = -Math.PI * 0.27;  // 倾斜，俯视椭圆效果
galaxyGroup.rotation.z = Math.PI * 0.04;
scene.add(galaxyGroup);

// ── Background Stars ──
(function(){
  const geo = new THREE.BufferGeometry();
  const n = 3000;
  const pos = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r = 1200 + Math.random()*1200;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2] = r*Math.cos(phi);
    const br = 0.6+Math.random()*0.4;
    col[i*3]=br; col[i*3+1]=br; col[i*3+2]=br+0.1;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({size:1.5,vertexColors:true,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
})();

// ── Spiral Arms ──
function makeSpiralArm(offset, n, c1hex, c2hex){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  const c1 = new THREE.Color(c1hex);
  const c2 = new THREE.Color(c2hex);
  for(let i=0;i<n;i++){
    const t = i/n;
    const angle = t * Math.PI * 4.2 + offset;
    const r = 15 + t*400;
    const spread = (Math.random()-0.5)*(8+t*35);
    const heightSpread = (Math.random()-0.5)*(4+t*10);
    pos[i*3]   = Math.cos(angle)*(r+spread);
    pos[i*3+1] = heightSpread;
    pos[i*3+2] = Math.sin(angle)*(r+spread);
    const c = new THREE.Color().lerpColors(c1,c2,t);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({
    size:2.8, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.92,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  return new THREE.Points(geo,mat);
}
galaxyGroup.add(makeSpiralArm(0,       8000, '#ffffff', '#8899ff'));
galaxyGroup.add(makeSpiralArm(Math.PI, 8000, '#ffffff', '#9988ee'));

// ── Dense Core Particles ──
(function(){
  const geo = new THREE.BufferGeometry();
  const n = 2000;
  const pos = new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r = Math.random()*40;
    const a = Math.random()*Math.PI*2;
    pos[i*3]=Math.cos(a)*r+(Math.random()-0.5)*8;
    pos[i*3+1]=(Math.random()-0.5)*6;
    pos[i*3+2]=Math.sin(a)*r+(Math.random()-0.5)*8;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({
    size:2.2, color:0xffffff, transparent:true, opacity:0.9,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  galaxyGroup.add(new THREE.Points(geo,mat));
})();

// ── Star Core ──
const tLoader = new THREE.TextureLoader();
const coreMat = new THREE.MeshBasicMaterial({color:0xffffff});
const coreMesh = new THREE.Mesh(new THREE.SphereGeometry(14,32,32), coreMat);
coreMesh.userData = {isCore:true};
galaxyGroup.add(coreMesh);

// Glow layers
[[22,0xffffff,0.45],[36,0xbbccff,0.22],[55,0x8899dd,0.12],[80,0x4455aa,0.06]].forEach(([s,c,o])=>{
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(s,16,16),
    new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  galaxyGroup.add(m);
});

// ── Orbit Lines ──
function makeOrbit(r){
  const pts = [];
  for(let i=0;i<=128;i++){
    const a=i/128*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineLoop(geo, new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.1}));
}

// ── Planets ──
const planetMeshes = [];
const angles = [];
const labelEls = [];
let discovered = 0;
const discoveredSet = new Set();

// Load textures (with fallback)
const earthTex = tLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
const moonTex  = tLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg');

PLANETS.forEach((p,i)=>{
  angles.push(p.startAngle);
  galaxyGroup.add(makeOrbit(p.orbitR));

  let mat;
  if(p.useTexture==='earth'){
    mat = new THREE.MeshPhongMaterial({map:earthTex, shininess:60, specular:new THREE.Color(0x333333)});
  } else if(p.useTexture==='moon'){
    mat = new THREE.MeshPhongMaterial({map:moonTex, shininess:20});
  } else {
    mat = new THREE.MeshPhongMaterial({
      color: new THREE.Color(p.color),
      emissive: new THREE.Color(p.emissive),
      shininess: 80,
      specular: new THREE.Color(0x444444)
    });
  }

  const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size,32,32), mat);
  mesh.userData = {planetIdx:i};

  // Atmosphere glow
  const atmMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(p.color),
    transparent:true, opacity:0.18,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  const atmMesh = new THREE.Mesh(new THREE.SphereGeometry(p.size*1.35,16,16), atmMat);
  mesh.add(atmMesh);

  // Saturn ring
  if(p.isSaturn){
    [[p.size*1.6, p.size*2.1, 0xfde68a, 0.5],[p.size*2.2, p.size*2.9, 0xfbbf24, 0.25]].forEach(([ri,ro,rc,op])=>{
      const rGeo = new THREE.RingGeometry(ri,ro,64);
      const rMat = new THREE.MeshBasicMaterial({color:rc,transparent:true,opacity:op,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
      const ring = new THREE.Mesh(rGeo,rMat);
      ring.rotation.x = Math.PI*0.5;
      mesh.add(ring);
    });
  }

  const group = new THREE.Group();
  group.add(mesh);
  galaxyGroup.add(group);
  planetMeshes.push({mesh, group, data:p});

  // HTML Label
  const lbl = document.createElement('div');
  lbl.className = 'planet-label';
  lbl.textContent = p.name;
  document.body.appendChild(lbl);
  labelEls.push(lbl);
});

// ── Raycaster ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;

function getAllMeshes(){
  const arr = [coreMesh];
  planetMeshes.forEach(p=>arr.push(p.mesh));
  return arr;
}

renderer.domElement.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(getAllMeshes());
  document.body.style.cursor = hits.length ? 'pointer' : 'default';
});

renderer.domElement.addEventListener('click', e=>{
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(getAllMeshes(),true);
  if(!hits.length) return;
  const obj = hits[0].object;
  if(obj===coreMesh || obj.parent===coreMesh){
    showPanel(CONTACT,'#fbbf24');
  } else {
    // walk up to find planetIdx
    let cur = obj;
    while(cur && cur.userData.planetIdx===undefined) cur=cur.parent;
    if(cur && cur.userData.planetIdx!==undefined){
      const idx = cur.userData.planetIdx;
      const p = PLANETS[idx];
      if(!discoveredSet.has(idx)){
        discoveredSet.add(idx);
        discovered++;
        document.getElementById('disc').textContent=discovered;
      }
      showPanel(p.content, p.color);
    }
  }
});

// ── Panel ──
function showPanel(content, color){
  const panel = document.getElementById('panel');
  const body = document.getElementById('panel-body');
  panel.style.setProperty('--pc', color||'#c4b5fd');
  let html = '<div class="p-icon">'+(content.icon||'✦')+'</div>'+
    '<div class="p-period">'+(content.period||'')+'</div>'+
    '<div class="p-title">'+content.title+'</div>'+
    '<div class="p-org">'+content.org+'</div>';
  if(content.bullets){
    html += '<ul class="p-bullets">'+content.bullets.map(function(b){return '<li>'+b+'</li>'}).join('')+'</ul>';
  }
  if(content.tags){
    html += '<div class="p-tags">'+content.tags.map(function(t){return '<span class="p-tag">'+t+'</span>'}).join('')+'</div>';
  }
  if(content.skills){
    html += '<div class="p-divider"></div><div class="p-sub">熟练度</div>';
    content.skills.forEach(function(s){
      html += '<div class="sk-row"><span class="sk-lbl">'+s.name+'</span><div class="sk-bar"><div class="sk-fill" style="width:0%" data-pct="'+s.pct+'%"></div></div></div>';
    });
  }
  body.innerHTML = html;
  panel.classList.add('open');
  // animate skill bars
  setTimeout(function(){
    document.querySelectorAll('.sk-fill').forEach(function(el){
      el.style.width = el.dataset.pct;
    });
  },50);
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

function showTab(tab){
  if(tab==='contact') showPanel(CONTACT,'#c4b5fd');
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',i===(tab==='resume'?0:1));});
}

// ── Animation ──
const clock = new THREE.Clock();
const tmpVec = new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Rotate galaxy slowly
  galaxyGroup.rotation.y += 0.0004;

  // Orbit planets
  PLANETS.forEach(function(p,i){
    angles[i] += p.speed;
    const x = Math.cos(angles[i])*p.orbitR;
    const z = Math.sin(angles[i])*p.orbitR;
    planetMeshes[i].group.position.set(x,0,z);
    planetMeshes[i].mesh.rotation.y += 0.005;

    // Update label position
    planetMeshes[i].mesh.getWorldPosition(tmpVec);
    tmpVec.project(camera);
    const sx = (tmpVec.x*0.5+0.5)*window.innerWidth;
    const sy = (-tmpVec.y*0.5+0.5)*window.innerHeight;
    const lbl = labelEls[i];
    lbl.style.left = sx+'px';
    lbl.style.top  = (sy - planetMeshes[i].data.size*18 - 8)+'px';
    // Hide if behind
    lbl.style.opacity = tmpVec.z < 1 ? '1' : '0';
  });

  renderer.render(scene,camera);
}
animate();

// ── Resize ──
window.addEventListener('resize',function(){
  const w=window.innerWidth, h=window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});
</script>
</body>
</html>
